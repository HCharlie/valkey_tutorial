version: '3.8'

services:
  valkey-node-1:
    image: valkey/valkey:latest
    container_name: valkey-node-1
    command: valkey-server --port 6379 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --protected-mode no
    ports:
      - "7001:6379"
      - "17001:16379"
    networks:
      valkey-cluster-net:
        ipv4_address: 172.20.0.11

  valkey-node-2:
    image: valkey/valkey:latest
    container_name: valkey-node-2
    command: valkey-server --port 6379 --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --protected-mode no
    ports:
      - "7002:6379"
      - "17002:16379"
    networks:
      valkey-cluster-net:
        ipv4_address: 172.20.0.12

  valkey-node-3:
